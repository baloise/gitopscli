fail_fast: true
repos:
- repo: local
  hooks:
  - id: format-check
    name: make format-check
    entry: make format-check
    language: system
    pass_filenames: false
    always_run: true
  - id: lint
    name: make lint
    entry: make lint
    language: system
    pass_filenames: false
    always_run: true
  - id: typecheck
    name: make typecheck
    entry: make typecheck
    language: system
    pass_filenames: false
    always_run: true
  - id: test
    name: make test
    entry: make test
    language: system
    pass_filenames: false
    always_run: true
